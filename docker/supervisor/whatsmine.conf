redirect_stderr=true
stdout_logfile=/var/log/supervisor/wisperbot-automation.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5

[group:wisperbot-queues]
programs=wisperbot-queue-default,wisperbot-queue-whatsapp,wisperbot-queue-broadcast,wisperbot-queue-ai,wisperbot-queue-social,wisperbot-queue-leads,wisperbot-queue-automation
